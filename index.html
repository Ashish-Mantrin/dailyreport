<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Report Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef3fb;
            font-family: system-ui;
            overflow-x: hidden;
        }

        /* TOP BAR */
        .topbar {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            padding: 12px;
            position: sticky;
            top: 0;
            z-index: 999;
            border-radius: 0 0 14px 14px;
        }

        /* HISTORY */
        #historyPanel {
            display: none;
            background: white;
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
        }

        /* CARD */
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        /* TABLE */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            min-width: 900px;
        }

        table th {
            background: #0b3d91 !important;
            color: white;
            font-size: 12px;
        }

        table input {
            width: 100%;
            border: none;
            outline: none;
            text-align: center;
            font-size: 13px;
        }

        /* IMAGES */
        .img-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .img-grid img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        /* MODAL */
        #imgModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* ANIMATION */
        #imgModal img {
            max-width: 95%;
            max-height: 85%;
            border-radius: 12px;
        }

        /* BUTTON */
        button {
            border-radius: 10px !important;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="loginScreen"
        style="position:fixed;inset:0;background:#0d6efd;display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div style="background:white;padding:20px;border-radius:12px;width:280px;text-align:center;">
            <h5>Enter Password</h5>
            <input type="password" id="pass" class="form-control mb-2">
            <button class="btn btn-primary w-100" onclick="login()">Login</button>
        </div>
    </div>

    <!-- TOP -->
    <div class="topbar d-flex justify-content-between align-items-center">
        <b>DAILY REPORT SYSTEM</b>
        <button class="btn btn-light btn-sm" onclick="toggleHistory()">History</button>
    </div>

    <div class="container">

        <!-- HISTORY -->
        <div id="historyPanel">
            <div class="row g-2">
                <div class="col-8">
                    <input type="date" id="searchDate" class="form-control">
                </div>
                <div class="col-4">
                    <button class="btn btn-danger w-100" onclick="loadByDate()">Load</button>
                </div>
            </div>
        </div>

        <!-- CARD -->
        <div class="card mt-2">
            <div class="card-body">

                <!-- HEADER -->
                <div class="row g-2 mb-2">
                    <div class="col-6"><input type="date" id="date" class="form-control"></div>
                    <div class="col-4"><input id="day" class="form-control" readonly></div>
                    <div class="col-2"><input id="dayNo" class="form-control" readonly></div>
                </div>

                <!-- IMAGE -->
                <input type="file" id="imgInput" class="form-control mb-2" accept="image/*" capture="environment">
                <div class="img-grid" id="imgBox"></div>

                <!-- TABLE -->
                <div class="table-wrap mt-3">
                    <table class="table table-bordered text-center">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Batch</th>
                                <th>Product</th>
                                <th>Size</th>
                                <th>Batch Size</th>
                                <th>Total</th>
                                <th>Prod</th>
                                <th>Exp</th>
                            </tr>
                        </thead>
                        <tbody id="tbody"></tbody>
                    </table>
                </div>

                <!-- BUTTONS -->
                <div class="mt-3 d-flex gap-2">
                    <button class="btn btn-success btn-sm" onclick="addRow()">➕ Add Row</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteRow()">🗑 Delete Row</button>
                </div>

            </div>
        </div>

    </div>

    <!-- IMAGE MODAL -->
    <div id="imgModal">
        <div style="position:absolute;top:15px;right:15px;display:flex;gap:10px;">
            <button class="btn btn-danger btn-sm" onclick="deleteImage()">🗑 Delete</button>
            <button class="btn btn-light btn-sm" onclick="closeImg()">✖ Close</button>
        </div>
        <img id="bigImg">
    </div>

    <script>

        let tbody = document.getElementById("tbody");
        let date = document.getElementById("date");
        let day = document.getElementById("day");
        let dayNo = document.getElementById("dayNo");
        let imgBox = document.getElementById("imgBox");

        let images = [];
        let currentImgIndex = null;


        /* LOGIN */
        function login() {

            if (document.getElementById("pass").value === "A1") {

                document.getElementById("loginScreen").style.display = "none";
                init();

            } else {

                alert("Wrong Password");

            }

        }


        /* HEADER */
        function updateHeader() {

            let d = new Date(date.value);

            const days = [
                "Sunday",
                "Monday",
                "Tuesday",
                "Wednesday",
                "Thursday",
                "Friday",
                "Saturday"
            ];

            day.value = days[d.getDay()];

            let start = new Date(d.getFullYear(), 0, 0);

            dayNo.value = Math.floor(
                (d - start) / (1000 * 60 * 60 * 24)
            );

        }



        /* INIT */
        function init() {

            if (!date.value) {

                date.value = new Date().toISOString().split("T")[0];

            }

            updateHeader();

            load();

        }



        /* STORAGE KEY */
        function key() {

            return "report_" + date.value;

        }



        /* ADD ROW */
        function addRow() {

            let r = tbody.insertRow();


            r.innerHTML = `
        <td>${tbody.rows.length}</td>
        <td><input></td>
        <td><input></td>
        <td><input></td>
        <td><input type="number"></td>
        <td><input type="number"></td>
        <td><input type="date"></td>
        <td><input type="date"></td>
        `;


            r.querySelectorAll("input").forEach(i => {

                i.oninput = save;

                i.onchange = save;

            });

        }



        /* DELETE ROW */
        function deleteRow() {

            let p = prompt("Password:");

            if (p !== "1234") {

                alert("Wrong");
                return;

            }


            if (tbody.rows.length > 0) {

                tbody.deleteRow(-1);

                save();

            }

        }



        /* SAVE */
        function save() {


            let data = [];


            [...tbody.rows].forEach(r => {


                let row = [...r.querySelectorAll("input")]
                    .map(i => i.value);


                data.push(row);


            });



            let report = {

                date: date.value,

                day: day.value,

                dayNo: dayNo.value,

                data: data,

                images: images

            };



            localStorage.setItem(

                key(),

                JSON.stringify(report)

            );


        }



        function load() {

                tbody.innerHTML = "";
                imgBox.innerHTML = "";
                images = [];

                let report = localStorage.getItem(key());

                if (!report) {

                    // New day → create empty report
                    for (let i = 0; i < 5; i++) {
                        addRow();
                    }

                    return;
                }

                let d = JSON.parse(report);

                if (d.data) {

                    d.data.forEach(r => {

                        addRow();

                        [...tbody.lastChild.querySelectorAll("input")]
                            .forEach((i, j) => {

                                i.value = r[j] || "";

                            });

                    });

                }

                if (d.images) {

                    images = d.images;

                    d.images.forEach((img, i) => {

                        addImage(img, i);

                    });

                }

            }



        /* IMAGE UPLOAD */
        document.getElementById("imgInput")
            .addEventListener("change", function () {


                let file = this.files[0];


                if (!file) return;



                let reader = new FileReader();



                reader.onload = function () {



                    images.push({

                        src: reader.result

                    });



                    addImage(

                        { src: reader.result },

                        images.length - 1

                    );



                    save();



                };



                reader.readAsDataURL(file);



            });




        /* SHOW IMAGE */
        function addImage(img, i) {


            let el = document.createElement("img");


            el.src = img.src;



            el.onclick = function () {



                currentImgIndex = i;



                document.getElementById("imgModal")
                    .style.display = "flex";



                document.getElementById("bigImg")
                    .src = img.src;



            };



            imgBox.appendChild(el);



        }





        /* DELETE IMAGE */
        function deleteImage() {


            let p = prompt("Delete password:");



            if (p !== "1234") return;



            images.splice(currentImgIndex, 1);



            save();



            closeImg();



            load();



        }





        /* CLOSE IMAGE */
        function closeImg() {


            document.getElementById("imgModal")
                .style.display = "none";


        }




        /* HISTORY */
        function toggleHistory() {


            let h = document.getElementById("historyPanel");



            h.style.display =

                h.style.display === "block"

                    ? "none"

                    : "block";


        }





        function loadByDate() {


            let selectedDate =
                document.getElementById("searchDate").value;



            if (!selectedDate) {

                alert("Select date first");

                return;

            }



            date.value = selectedDate;



            updateHeader();



            load();



        }





    /* DATE CHANGE */
    date.onchange = function () {

        // Save current day's report before switching
        save();

        // Update the new date header
        updateHeader();

        // Load the report for the selected date
        load();

    };




        /* AUTO SAVE */
        document.addEventListener("input", function (e) {


            if (e.target.tagName === "INPUT") {


                save();


            }


        });





        window.onbeforeunload = function () {


            save();


        };



    </script>

</body>

</html>
