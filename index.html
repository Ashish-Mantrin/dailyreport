<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daily Report</title>


    <link rel="stylesheet" href="style.css">


</head>



<body>



    <div class="container">



        <!-- ================= LOGIN PAGE ================= -->


        <div id="passwordPage">


            <h1>🔐 Daily Report</h1>


            <div class="field">


                <label>
                    Enter Password
                </label>


                <input type="password" id="passwordInput" placeholder="Enter Password">


            </div>



            <button class="btn enter" onclick="checkPassword()">

                ENTER

            </button>



            <p id="wrongPassword" style="color:red;text-align:center;margin-top:10px;">
            </p>



        </div>







        <!-- ================= HOME PAGE ================= -->


        <div id="homePage" class="hidden">



            <h1>
                📋 Daily Report
            </h1>




            <div class="date-box">



                <div class="field">

                    <label>
                        Select Date
                    </label>


                    <input type="date" id="datePicker">


                </div>





                <div class="field">

                    <label>
                        Day Name
                    </label>


                    <input id="dayName" readonly>


                </div>





                <div class="field">

                    <label>
                        Day Number
                    </label>


                    <input id="dayNumber" readonly>


                </div>



            </div>






            <button class="btn enter" onclick="openReport()">

                ENTER REPORT

            </button>




        </div>









        <!-- ================= REPORT PAGE ================= -->


        <div id="reportPage" class="hidden">



            <button class="btn back" onclick="goBack()">

                ⬅ Main Screen

            </button>





            <h2>
                📊 Production Report
            </h2>





            <div class="date-box">



                <div class="field">

                    <label>Date</label>

                    <input id="reportDate" readonly>

                </div>




                <div class="field">

                    <label>Day</label>

                    <input id="reportDay" readonly>

                </div>




                <div class="field">

                    <label>Number</label>

                    <input id="reportNumber" readonly>

                </div>



            </div>







            <!-- IMAGE AREA -->


            <div class="image-section">


                <h3>
                    📷 Report Image
                </h3>



                <input type="file" id="imageInput" accept="image/*">





                <img id="previewImage" style="display:none;" onclick="zoomImage()">





                <button id="deleteImageBtn" class="btn delete" onclick="deleteImage()" style="display:none;">

                    ❌ Delete Image

                </button>



            </div>









            <!-- TABLE -->


            <div class="table-container">



                <table id="reportTable">


                    <thead>


                        <tr>


                            <th>#</th>

                            <th>Batch</th>

                            <th>Product</th>

                            <th>Size</th>

                            <th>Batch Size</th>

                            <th>Total</th>

                            <th>Production</th>

                            <th>Expiry</th>


                        </tr>



                    </thead>



                    <tbody id="tableBody">


                    </tbody>



                </table>



            </div>









            <div class="table-buttons">



                <button class="btn add" onclick="addRow()">

                    ➕ Add Row

                </button>





                <button class="btn delete" onclick="deleteRow()">

                    🗑 Delete Row

                </button>




            </div>





        </div>







    </div>










    <!-- IMAGE ZOOM -->



    <div id="imageViewer" onclick="closeZoom()">



        <img id="bigImage">



    </div>









    <script src="script.js"></script>


</body>

</html>
